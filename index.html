<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOVAH Card News Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --surface-hover: #222;
    --text: #e8e8e8;
    --text-sub: #888;
    --accent: #FF6B35;
    --border: #2a2a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    padding: 60px 48px 40px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .header .logo-area {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
  }

  .header .logo-area svg { height: 28px; }

  .header .badge {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    background: rgba(255,107,53,0.12);
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  .header h1 {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-sub);
    letter-spacing: 0.5px;
  }

  /* Grid */
  .grid {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 48px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 24px;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .card:hover {
    background: var(--surface-hover);
    border-color: #333;
    transform: translateY(-2px);
  }

  .card .thumb {
    width: 100%;
    aspect-ratio: 1080 / 1350;
    max-height: 360px;
    overflow: hidden;
    background: #111;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .card .thumb iframe {
    width: 1080px;
    height: 1350px;
    border: none;
    transform: scale(0.3);
    transform-origin: top center;
    pointer-events: none;
  }

  .card .thumb .preview-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
  }

  .card .info {
    padding: 20px 24px 24px;
  }

  .card .info .tag {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 1.5px;
    margin-bottom: 8px;
  }

  .card .info h2 {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 8px;
    color: var(--text);
  }

  .card .info .desc {
    font-size: 13px;
    color: var(--text-sub);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .card .info .meta {
    font-size: 11px;
    color: #555;
    display: flex;
    gap: 12px;
  }

  /* Action buttons */
  .card .info .actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .card .info .actions .act-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-sub);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
  }

  .card .info .actions .act-btn:hover {
    border-color: #444;
    background: rgba(255,255,255,0.04);
  }

  .card .info .actions .act-btn.active-like {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(255,107,53,0.08);
  }

  .card .info .actions .act-btn.active-error {
    border-color: #e74c3c;
    color: #e74c3c;
    background: rgba(231,76,60,0.08);
  }

  .card .info .actions .act-btn svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }

  /* Card status indicators */
  .card.liked { border-left: 3px solid var(--accent); }
  .card.has-error { border-left: 3px solid #e74c3c; }
  .card.liked.has-error { border-left: 3px solid var(--accent); border-right: 3px solid #e74c3c; }

  /* Filter bar */
  .filter-bar {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 48px 24px;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .filter-bar .filter-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-sub);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .filter-bar .filter-btn:hover { border-color: #444; color: var(--text); }
  .filter-bar .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(255,107,53,0.08); }

  .filter-bar .count {
    font-size: 11px;
    color: var(--text-sub);
    margin-left: auto;
  }

  /* Empty state for new */
  .card-new {
    border: 2px dashed var(--border);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 320px;
    cursor: default;
  }

  .card-new:hover {
    border-color: var(--accent);
    background: rgba(255,107,53,0.03);
    transform: none;
  }

  .card-new .inner {
    text-align: center;
    padding: 40px;
  }

  .card-new .plus {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 24px;
    color: var(--text-sub);
    transition: all 0.2s;
  }

  .card-new:hover .plus {
    border-color: var(--accent);
    color: var(--accent);
  }

  .card-new p {
    font-size: 13px;
    color: var(--text-sub);
    line-height: 1.6;
  }

  .card-new p strong {
    color: var(--text);
    font-weight: 500;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .header { padding: 40px 24px 28px; }
    .grid { padding: 0 24px 60px; grid-template-columns: 1fr; }
    .filter-bar { padding: 0 24px 20px; }
  }
</style>
</head>

// State management
const STATE_KEY = 'flovah-hub-state';
let state = {};
try { state = JSON.parse(localStorage.getItem(STATE_KEY)) || {}; } catch(e) { state = {}; }
function saveState() { try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch(e) {} }
function getState(id) { return state[id] || { liked: false, error: false }; }
function toggleState(id, key) {
  if (!state[id]) state[id] = { liked: false, error: false };
  state[id][key] = !state[id][key];
  saveState();
}

// SVG icons
const heartEmpty = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
const heartFill = `<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
const flagEmpty = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>`;
const flagFill = `<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>`;

// Render
const grid = document.getElementById('grid');
let currentFilter = 'all';
let cardElements = [];

function renderCards() {
  grid.innerHTML = '';
  cardElements = [];
  let visibleCount = 0;

  articles.forEach(a => {
    const s = getState(a.id);
    const card = document.createElement('div');
    card.className = 'card';
    if (s.liked) card.classList.add('liked');
    if (s.error) card.classList.add('has-error');
    card.dataset.id = a.id;

    // Filter visibility
    if (currentFilter === 'liked' && !s.liked) { card.style.display = 'none'; }
    else if (currentFilter === 'error' && !s.error) { card.style.display = 'none'; }
    else { visibleCount++; }

    card.innerHTML = `
      <div class="info">
        <div class="tag">${a.tag}</div>
        <h2>${a.title}</h2>
        <div class="desc">${a.desc}</div>
        <div class="meta">
          <span>${a.date}</span>
          <span>${a.slides} slides</span>
        </div>
        <div class="actions">
          <button class="act-btn like-btn ${s.liked ? 'active-like' : ''}" data-id="${a.id}">
            ${s.liked ? heartFill : heartEmpty} ${s.liked ? '올림' : '올린 글'}
          </button>
          <button class="act-btn error-btn ${s.error ? 'active-error' : ''}" data-id="${a.id}">
            ${s.error ? flagFill : flagEmpty} ${s.error ? '오류 있음' : '오류 체크'}
          </button>
        </div>
      </div>
    `;

    // Click to open article (but not on buttons)
    card.addEventListener('click', (e) => {
      if (e.target.closest('.act-btn')) return;
      window.open(a.file, '_blank');
    });

    grid.appendChild(card);
    cardElements.push(card);
  });

  // Button event listeners
  grid.querySelectorAll('.like-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleState(btn.dataset.id, 'liked');
      renderCards();
    });
  });

  grid.querySelectorAll('.error-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleState(btn.dataset.id, 'error');
      renderCards();
    });
  });

  // "New" placeholder
  const newCard = document.createElement('div');
  newCard.className = 'card card-new';
  newCard.innerHTML = `
    <div class="inner">
      <div class="plus">+</div>
      <p><strong>새 카드뉴스 추가</strong><br>articles 폴더에 HTML을 넣고<br>위 registry에 등록하세요</p>
    </div>
  `;
  if (currentFilter === 'all') grid.appendChild(newCard);

  // Update count
  const likedCount = articles.filter(a => getState(a.id).liked).length;
  const errorCount = articles.filter(a => getState(a.id).error).length;
  const label = document.getElementById('countLabel');
  if (currentFilter === 'all') label.textContent = `전체 ${articles.length}개 · 올림 ${likedCount}개 · 오류 ${errorCount}개`;
  else if (currentFilter === 'liked') label.textContent = `올린 글 ${likedCount}개`;
  else label.textContent = `오류 체크 ${errorCount}개`;
}

// Filter bar
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderCards();
  });
});

renderCards();
</script>
