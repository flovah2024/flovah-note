<title>FLOVAH Card News Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --surface-hover: #222;
    --text: #e8e8e8;
    --text-sub: #888;
    --accent: #FF6B35;
    --border: #2a2a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    padding: 60px 48px 40px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .header .logo-area {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
  }

  .header .logo-area svg { height: 28px; }

  .header .badge {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    background: rgba(255,107,53,0.12);
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  .header h1 {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-sub);
    letter-spacing: 0.5px;
  }

  /* Grid */
  .grid {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 48px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 24px;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .card:hover {
    background: var(--surface-hover);
    border-color: #333;
    transform: translateY(-2px);
  }

  .card .thumb {
    width: 100%;
    aspect-ratio: 1080 / 1350;
    max-height: 360px;
    overflow: hidden;
    background: #111;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .card .thumb iframe {
    width: 1080px;
    height: 1350px;
    border: none;
    transform: scale(0.3);
    transform-origin: top center;
    pointer-events: none;
  }

  .card .thumb .preview-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
  }

  .card .info {
    padding: 20px 24px 24px;
  }

  .card .info .tag {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 1.5px;
    margin-bottom: 8px;
  }

  .card .info h2 {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 8px;
    color: var(--text);
  }

  .card .info .desc {
    font-size: 13px;
    color: var(--text-sub);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .card .info .meta {
    font-size: 11px;
    color: #555;
    display: flex;
    gap: 12px;
  }

  /* Empty state for new */
  .card-new {
    border: 2px dashed var(--border);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 320px;
    cursor: default;
  }

  .card-new:hover {
    border-color: var(--accent);
    background: rgba(255,107,53,0.03);
    transform: none;
  }

  .card-new .inner {
    text-align: center;
    padding: 40px;
  }

  .card-new .plus {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 24px;
    color: var(--text-sub);
    transition: all 0.2s;
  }

  .card-new:hover .plus {
    border-color: var(--accent);
    color: var(--accent);
  }

  .card-new p {
    font-size: 13px;
    color: var(--text-sub);
    line-height: 1.6;
  }

  .card-new p strong {
    color: var(--text);
    font-weight: 500;
  }

  /* Delete button */
  .card { position: relative; }
  .delete-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    color: rgba(255,255,255,0.6);
    font-size: 16px;
    cursor: pointer;
    opacity: 0;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .card:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { background: #e53935; color: #fff; }

  /* Delete confirm modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #1c1c1e;
    border: 1px solid #333;
    border-radius: 16px;
    padding: 32px 36px;
    max-width: 400px;
    width: 90%;
    text-align: center;
  }
  .modal h3 {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 8px;
  }
  .modal p {
    font-size: 14px;
    color: #888;
    margin-bottom: 24px;
    line-height: 1.6;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .modal-actions button {
    padding: 10px 24px;
    border: none;
    border-radius: 980px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
  }
  .modal-cancel {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.6);
  }
  .modal-cancel:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .modal-delete {
    background: #e53935;
    color: #fff;
  }
  .modal-delete:hover { background: #c62828; }
  .modal-status {
    font-size: 13px;
    color: #888;
    margin-top: 16px;
    display: none;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .header { padding: 40px 24px 28px; }
    .grid { padding: 0 24px 60px; grid-template-columns: 1fr; }
  }
</style>
</head>

function showDeleteModal(article, cardEl) {
  const modal = document.getElementById('deleteModal');
  document.getElementById('modalTitle').textContent = '矛聲聞铆聥掳铆聛麓 矛聜颅矛聽聹';
  document.getElementById('modalDesc').innerHTML = `<strong>"${article.title}"</strong>矛聺聞(毛楼录) 矛聜颅矛聽聹铆聲聵矛聥聹锚虏聽矛聤碌毛聥聢锚鹿聦?<br>GitHub矛聴聬矛聞聹 铆聦聦矛聺录矛聺麓 矛聜颅矛聽聹毛聬聵毛漏掳 毛鲁碌锚碌卢铆聲聽 矛聢聵 矛聴聠矛聤碌毛聥聢毛聥陇.`;
  document.getElementById('modalStatus').style.display = 'none';
  document.getElementById('confirmDeleteBtn').disabled = false;
  document.getElementById('confirmDeleteBtn').onclick = () => deleteArticle(article, cardEl);
  modal.classList.add('active');
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('active');
}

async function deleteArticle(article, cardEl) {
  const statusEl = document.getElementById('modalStatus');
  const deleteBtn = document.getElementById('confirmDeleteBtn');
  statusEl.style.display = 'block';
  statusEl.textContent = '矛聜颅矛聽聹 矛陇聭...';
  deleteBtn.disabled = true;

  try {
    // 1. Delete article file from GitHub
    const fileResp = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${article.file}`, {
      headers: { 'Authorization': 'token ' + GH_TOKEN }
    });
    const fileData = await fileResp.json();

    await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${article.file}`, {
      method: 'DELETE',
      headers: { 'Authorization': 'token ' + GH_TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Delete article: ' + article.id, sha: fileData.sha })
    });

    // 2. Update index.html on GitHub 芒聙聰 remove this article from array
    const idxResp = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/index.html`, {
      headers: { 'Authorization': 'token ' + GH_TOKEN }
    });
    const idxData = await idxResp.json();
    const raw = atob(idxData.content.replace(/\\n/g, ''));
    const bytes = new Uint8Array([...raw].map(c => c.charCodeAt(0)));
    let idxHtml = new TextDecoder('utf-8').decode(bytes);

    // Remove article entry block
    const entryRe = new RegExp(',?\\s*\\{\\s*id:\\s*"' + article.id + '"[^}]*\\}', 's');
    idxHtml = idxHtml.replace(entryRe, '');
    // Clean up leading comma after [
    idxHtml = idxHtml.replace(/\[\s*,/, '[');

    const enc = new TextEncoder().encode(idxHtml);
    let bin = '';
    for (let i = 0; i < enc.length; i++) bin += String.fromCharCode(enc[i]);
    const b64 = btoa(bin);

    await fetch(`https://api.github.com/repos/${GH_REPO}/contents/index.html`, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + GH_TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Remove ' + article.id + ' from index', content: b64, sha: idxData.sha })
    });

    // 3. Remove card from DOM
    cardEl.remove();
    statusEl.textContent = '矛聜颅矛聽聹 矛聶聞毛拢聦!';
    setTimeout(closeDeleteModal, 800);

  } catch(err) {
    statusEl.textContent = '矛聵陇毛楼聵: ' + err.message;
    deleteBtn.disabled = false;
  }
}
