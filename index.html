<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOVAH Card News Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --surface-hover: #222;
    --text: #e8e8e8;
    --text-sub: #888;
    --accent: #FF6B35;
    --border: #2a2a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    padding: 60px 48px 40px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .header .logo-area {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
  }

  .header .logo-area svg { height: 28px; }

  .header .badge {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    background: rgba(255,107,53,0.12);
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  .header h1 {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-sub);
    letter-spacing: 0.5px;
  }

  /* Grid */
  .grid {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 48px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 24px;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .card:hover {
    background: var(--surface-hover);
    border-color: #333;
    transform: translateY(-2px);
  }

  .card .thumb {
    width: 100%;
    aspect-ratio: 1080 / 1350;
    max-height: 360px;
    overflow: hidden;
    background: #111;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .card .thumb iframe {
    width: 1080px;
    height: 1350px;
    border: none;
    transform: scale(0.3);
    transform-origin: top center;
    pointer-events: none;
  }

  .card .thumb .preview-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
  }

  .card .info {
    padding: 20px 24px 24px;
  }

  .card .info .tag {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 1.5px;
    margin-bottom: 8px;
  }

  .card .info h2 {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 8px;
    color: var(--text);
  }

  .card .info .desc {
    font-size: 13px;
    color: var(--text-sub);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .card .info .meta {
    font-size: 11px;
    color: #555;
    display: flex;
    gap: 12px;
  }

  /* Action buttons */
  .card .info .actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .card .info .actions .act-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-sub);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
  }

  .card .info .actions .act-btn:hover {
    border-color: #444;
    background: rgba(255,255,255,0.04);
  }

  .card .info .actions .act-btn.active-like {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(255,107,53,0.08);
  }

  .card .info .actions .act-btn.active-error {
    border-color: #e74c3c;
    color: #e74c3c;
    background: rgba(231,76,60,0.08);
  }

  .card .info .actions .act-btn svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }

  /* Card status indicators */
  .card.liked { border-left: 3px solid var(--accent); }
  .card.has-error { border-left: 3px solid #e74c3c; }
  .card.liked.has-error { border-left: 3px solid var(--accent); border-right: 3px solid #e74c3c; }

  /* Filter bar */
  .filter-bar {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 48px 24px;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .filter-bar .filter-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-sub);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .filter-bar .filter-btn:hover { border-color: #444; color: var(--text); }
  .filter-bar .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(255,107,53,0.08); }

  .filter-bar .count {
    font-size: 11px;
    color: var(--text-sub);
    margin-left: auto;
  }

  /* Empty state for new */
  .card-new {
    border: 2px dashed var(--border);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 320px;
    cursor: default;
  }

  .card-new:hover {
    border-color: var(--accent);
    background: rgba(255,107,53,0.03);
    transform: none;
  }

  .card-new .inner {
    text-align: center;
    padding: 40px;
  }

  .card-new .plus {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 24px;
    color: var(--text-sub);
    transition: all 0.2s;
  }

  .card-new:hover .plus {
    border-color: var(--accent);
    color: var(--accent);
  }

  .card-new p {
    font-size: 13px;
    color: var(--text-sub);
    line-height: 1.6;
  }

  .card-new p strong {
    color: var(--text);
    font-weight: 500;
  }

  /* Sync UI */
  .sync-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
  }

  .sync-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-sub);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .sync-btn:hover { border-color: #444; color: var(--text); }

  .sync-status {
    font-size: 12px;
    color: var(--text-sub);
    transition: all 0.3s;
  }

  .sync-status.loading { color: #58a6ff; }
  .sync-status.ok { color: #3fb950; }
  .sync-status.warn { color: #d29922; }

  /* Responsive */
  @media (max-width: 768px) {
    .header { padding: 40px 24px 28px; }
    .grid { padding: 0 24px 60px; grid-template-columns: 1fr; }
    .filter-bar { padding: 0 24px 20px; }
  }
</style>
</head>

const STATE_KEY = 'flovah-hub-state';

const OWNER = 'flovah2024';
const REPO = 'flovah-note';
const STATE_FILE = 'check-state.json';
const SYNC_API = 'https://api.github.com';

let state = {};
let fileSha = null;
let syncTimer = null;
let isSyncing = false;

try { state = JSON.parse(localStorage.getItem(STATE_KEY)) || {}; } catch(e) { state = {}; }

function saveStateLocal() {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch(e) {}
}

function getState(id) { return state[id] || { liked: false, error: false }; }

function toggleState(id, key) {
  if (!state[id]) state[id] = { liked: false, error: false };
  state[id][key] = !state[id][key];
  saveStateLocal();
  scheduleSyncPush();
}

function showSyncStatus(msg, type) {
  let el = document.getElementById('syncStatus');
  if (!el) return;
  el.textContent = msg;
  el.className = 'sync-status ' + (type || '');
  if (type === 'ok') setTimeout(() => { el.textContent = ''; el.className = 'sync-status'; }, 2500);
}

}

async function syncPush() {
  const token = localStorage.getItem(TOKEN_KEY);
  if (!token || isSyncing) return;
  isSyncing = true;
  showSyncStatus('ì ì¥ ì¤...', 'loading');
  try {
    const getRes = await fetch(SYNC_API + '/repos/' + OWNER + '/' + REPO + '/contents/' + STATE_FILE, {
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' }, cache: 'no-store'
    });
    if (getRes.ok) { fileSha = (await getRes.json()).sha; }
    const body = { message: 'sync: update check-state', content: btoa(unescape(encodeURIComponent(JSON.stringify(state, null, 2)))) };
    if (fileSha) body.sha = fileSha;
    const putRes = await fetch(SYNC_API + '/repos/' + OWNER + '/' + REPO + '/contents/' + STATE_FILE, {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!putRes.ok) throw new Error((await putRes.json().catch(()=>({}))).message || 'HTTP ' + putRes.status);
    fileSha = (await putRes.json()).content.sha;
    showSyncStatus('ì ì¥ ìë£', 'ok');
  } catch (e) {
    console.warn('Sync push failed:', e);
    showSyncStatus('ì ì¥ ì¤í¨', 'warn');
  } finally { isSyncing = false; }
}

function scheduleSyncPush() {
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(() => syncPush(), 3000);
}

  }
}
